theme: jekyll-theme-chirpy

lang: ko
timezone: Asia/Seoul

title: 김수명 블로그
tagline: Version 2.0
description: >-
  여러가지 올리는 블로그

url: "https://sumyeong.kim"

github:
  username: lifespank

social:
  name: 김수명
  email: admin@sumyeong.kim
  links:
    - https://github.com/lifespank
    - https://instagram.com/lifespan_king

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

theme_mode:

cdn:

avatar: /assets/img/myphoto.jpg

social_preview_image:

toc: true

comments:
  provider: disqus
  disqus:
    shortname: sumyeongkim

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

plugins:
  - jekyll-gfm-admonitions

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: [html, body, li, dt, dd, optgroup, option, colgroup, caption, thead, tbody, tfoot, tr, td, th]
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - CLAUDE.md
  - .claude/

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
